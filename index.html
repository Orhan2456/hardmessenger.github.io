<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hard Messenger - Gelişmiş Ağ</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* --- GENEL TASARIM --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body, html { height: 100%; background-color: #121212; color: #fff; overflow: hidden; }
        
        /* GİRİŞ EKRANI */
        .login-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1f2937, #111827);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 0.5s;
        }
        .login-box { background: #1e1e1e; padding: 30px; border-radius: 12px; text-align: center; border: 1px solid #333; width: 90%; max-width: 400px; box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .login-box h1 { font-size: 24px; margin-bottom: 10px; color: #3b82f6; }
        .login-box p { font-size: 14px; color: #9ca3af; margin-bottom: 20px; }
        .login-box input[type="text"] { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #444; background: #252526; color: white; font-size: 16px; margin-bottom: 15px; text-align: center; outline: none; }
        .login-box input[type="text"]:focus { border-color: #3b82f6; }
        .remember-wrapper { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; font-size: 14px; color: #ccc; cursor: pointer; }
        .login-box button { width: 100%; padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .login-box button:hover { background: #2563eb; }

        /* ANA UYGULAMA DÜZENİ */
        .messenger-app { display: none; width: 100%; height: 100%; max-width: 1200px; margin: 0 auto; background: #0f0f0f; position: relative; }

        /* SOL MENÜ */
        .sidebar { width: 320px; background: #1e1e1e; border-right: 1px solid #333; display: flex; flex-direction: column; height: 100%; }
        .profile-section { background: linear-gradient(135deg, #1f2937, #111827); padding: 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .profile-info h2 { font-size: 11px; color: #9ca3af; text-transform: uppercase; margin-bottom: 5px; }
        .username-display { font-size: 20px; font-weight: bold; color: #10b981; }
        .btn-logout { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }

        .friends-section { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .add-friend-box { padding: 15px; border-bottom: 1px solid #333; display: flex; gap: 8px; }
        .add-friend-box input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #444; background: #252526; color: white; outline: none; font-size: 14px; }
        .add-friend-box button { padding: 10px 15px; background: #3b82f6; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        .friends-list { list-style: none; overflow-y: auto; flex: 1; }
        .friend-item { padding: 15px; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .friend-item:hover { background: #252526; }
        .friend-name { font-weight: bold; font-size: 15px; }
        .btn-delete { background: transparent; color: #666; border: none; font-size: 16px; cursor: pointer; }
        .btn-delete:hover { color: #ef4444; }

        .status-box { padding: 15px; font-size: 13px; text-align: center; background: #1a1a1a; border-top: 1px solid #333; color: #9ca3af; }

        /* SAĞ MENÜ (Sohbet Ekranı) */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #0f0f0f; height: 100%; position: relative; overflow: hidden; }
        .chat-header { background: #1e1e1e; padding: 15px 20px; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; z-index: 10; }
        .chat-header-info { display: flex; align-items: center; flex: 1; }
        .chat-title-wrapper { flex: 1; }
        .chat-title-wrapper h3 { font-size: 16px; margin-bottom: 2px; }
        .chat-title-wrapper span { font-size: 12px; color: #10b981; }
        .btn-back { display: none; background: transparent; color: #3b82f6; border: none; font-size: 16px; font-weight: bold; cursor: pointer; padding-right: 15px; }

        /* Arama Butonları */
        .header-actions { display: flex; gap: 8px; }
        .btn-header-call { background: #10b981; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s; display: none; }
        .btn-header-call:hover { background: #059669; }
        .btn-header-video { background: #3b82f6; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s; display: none; }
        .btn-header-video:hover { background: #2563eb; }
        .btn-header-end { background: #ef4444; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s; display: none; }
        
        /* GÖRÜNTÜLÜ ARAMA ALANI (OVERLAY) */
        .video-overlay {
            position: absolute; top: 65px; left: 0; width: 100%; height: calc(100% - 65px);
            background: #000; z-index: 50; display: none; justify-content: center; align-items: center;
        }
        #remote-video { width: 100%; height: 100%; object-fit: cover; background: #111; }
        #local-video {
            position: absolute; bottom: 90px; right: 20px; width: 100px; height: 150px;
            object-fit: cover; border-radius: 12px; border: 2px solid #3b82f6; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); background: #222; transform: scaleX(-1); /* Ayna efekti */
        }

        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .message.sent { background: #2563eb; align-self: flex-end; border-bottom-right-radius: 2px; }
        .message.received { background: #2d2d30; align-self: flex-start; border-bottom-left-radius: 2px; }
        .message.ping { background: transparent; color: #ef4444; font-weight: bold; font-size: 18px; align-self: center; border: 2px dashed #ef4444; padding: 8px 15px; }
        
        audio { height: 35px; max-width: 200px; outline: none; border-radius: 20px; }
        audio::-webkit-media-controls-panel { background-color: #f1f5f9; }

        .msg-time { display: block; font-size: 11px; margin-top: 5px; opacity: 0.7; text-align: right; }
        .status-d { color: #93c5fd; font-weight: bold; margin-left: 5px; }
        .status-r { color: #10b981; font-weight: bold; margin-left: 5px; }

        .chat-input-area { display: flex; padding: 15px; background: #1e1e1e; border-top: 1px solid #333; gap: 10px; align-items: center; z-index: 10; }
        #message-input { flex: 1; padding: 15px; border: 1px solid #444; border-radius: 25px; background: #252526; color: white; font-size: 15px; outline: none; transition: 0.3s; }
        #message-input:disabled { background: #1a1a1a; cursor: not-allowed; }
        
        .btn-action { background: #3b82f6; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-ping { background: #ef4444; font-size: 12px; }
        .btn-mic { background: #10b981; font-size: 18px; }
        .btn-mic.recording { background: #ef4444; animation: pulse 1s infinite; }

        /* Gelen Arama Modalı */
        .call-modal { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #1e1e1e; border: 2px solid #3b82f6; padding: 20px; border-radius: 12px; z-index: 1000; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: none; }
        .call-modal h4 { margin-bottom: 15px; font-size: 16px; color: white; }
        .call-modal-btns { display: flex; gap: 15px; justify-content: center; }
        .call-modal-btns button { padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; color: white; }
        .btn-accept { background: #10b981; }
        .btn-reject { background: #ef4444; }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* MOBİL UYARLAMA */
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; z-index: 60; transition: transform 0.3s; }
            .chat-area { width: 100%; position: absolute; z-index: 5; }
            .sidebar.hidden { transform: translateX(-100%); }
            .btn-back { display: block; }
            .header-actions { flex-wrap: wrap; justify-content: flex-end; }
        }
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-3px, 2px); }
            40% { transform: translate(3px, -2px); }
            60% { transform: translate(-3px, -2px); }
            80% { transform: translate(3px, 2px); }
        }
        .shake-animation { animation: shake 0.4s; }
    </style>
</head>
<body>

    <div class="login-screen" id="login-screen">
        <div class="login-box">
            <h1>Hard Messenger</h1>
            <p>Ağa bağlanmak için kimliğinizi oluşturun.</p>
            <input type="text" id="my-username-input" placeholder="Kullanıcı Adınız" maxlength="15" autocomplete="off">
            <label class="remember-wrapper">
                <input type="checkbox" id="remember-me" checked> Beni Hatırla
            </label>
            <button id="login-btn">Ağa Katıl</button>
        </div>
    </div>

    <div class="messenger-app" id="app">
        
        <aside class="sidebar" id="sidebar">
            <div class="profile-section">
                <div class="profile-info">
                    <h2>Senin Kimliğin</h2>
                    <div class="username-display" id="my-username-display">...</div>
                </div>
                <button class="btn-logout" id="logout-btn">Çıkış Yap</button>
            </div>
            
            <div class="friends-section">
                <div class="add-friend-box">
                    <input type="text" id="new-friend-input" placeholder="Arkadaşının Adı" autocomplete="off">
                    <button id="add-friend-btn">Ekle</button>
                </div>
                <ul class="friends-list" id="friends-list"></ul>
            </div>

            <div class="status-box" id="network-status">
                Durum: Bağlantı Bekleniyor
            </div>
        </aside>

        <main class="chat-area" id="chat-area">
            
            <div class="call-modal" id="call-modal">
                <h4 id="caller-name">Birisi arıyor...</h4>
                <div class="call-modal-btns">
                    <button class="btn-accept" id="btn-accept-call">📞 Yanıtla</button>
                    <button class="btn-reject" id="btn-reject-call">✖ Reddet</button>
                </div>
            </div>

            <header class="chat-header">
                <button class="btn-back" id="back-btn">❮</button>
                <div class="chat-header-info">
                    <div class="chat-title-wrapper">
                        <h3 id="chat-title">Bir Kişi Seçin</h3>
                        <span id="connection-status" style="display:none;">Güvenli Bağlantı Kuruldu</span>
                    </div>
                    <div class="header-actions">
                        <button class="btn-header-call" id="btn-start-call" title="Sesli Ara">📞 Sesli</button>
                        <button class="btn-header-video" id="btn-start-video" title="Görüntülü Ara">📹 Görüntülü</button>
                        <button class="btn-header-end" id="btn-end-call" title="Aramayı Kapat">🛑 Kapat</button>
                    </div>
                </div>
            </header>

            <div id="video-overlay" class="video-overlay">
                <video id="remote-video" autoplay playsinline></video>
                <video id="local-video" autoplay muted playsinline></video>
            </div>
            
            <div class="chat-box" id="chat-box"></div>

            <form class="chat-input-area" id="chat-form">
                <button type="button" class="btn-action btn-ping" id="ping-btn" disabled title="Dikkat Çek!">PING!</button>
                <button type="button" class="btn-action btn-mic" id="mic-btn" disabled title="Sesli Mesaj Kaydet">🎤</button>
                <input type="text" id="message-input" placeholder="Mesaj yazın..." autocomplete="off" disabled>
                <button type="submit" class="btn-action" id="send-btn" disabled title="Gönder">➤</button>
            </form>

            <audio id="remote-live-audio" autoplay style="display:none;"></audio>
        </main>
    </div>

    <script>
        // --- DEĞİŞKENLER VE SABİTLER ---
        const PREFIX = "hrmsg-";
        let peer = null;
        let currentConnection = null;
        let myUsername = "";
        let friends = JSON.parse(localStorage.getItem('hrmsg_friends')) || [];

        // Sesli Mesaj Değişkenleri
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        // Canlı Arama (Call) Değişkenleri
        let currentCall = null;
        let localStream = null;
        let pendingCall = null;

        // --- DOM ELEMENTLERİ ---
        const loginScreen = document.getElementById('login-screen');
        const appScreen = document.getElementById('app');
        const usernameInput = document.getElementById('my-username-input');
        const rememberMeCheck = document.getElementById('remember-me');
        const sidebar = document.getElementById('sidebar');
        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const networkStatus = document.getElementById('network-status');
        const chatTitle = document.getElementById('chat-title');
        const friendsListEl = document.getElementById('friends-list');
        const micBtn = document.getElementById('mic-btn');
        
        // Arama Elementleri
        const btnStartCall = document.getElementById('btn-start-call');
        const btnStartVideo = document.getElementById('btn-start-video');
        const btnEndCall = document.getElementById('btn-end-call');
        const callModal = document.getElementById('call-modal');
        const callerNameDisplay = document.getElementById('caller-name');
        const btnAcceptCall = document.getElementById('btn-accept-call');
        const btnRejectCall = document.getElementById('btn-reject-call');
        
        // Medya Elementleri
        const remoteLiveAudio = document.getElementById('remote-live-audio');
        const videoOverlay = document.getElementById('video-overlay');
        const localVideo = document.getElementById('local-video');
        const remoteVideo = document.getElementById('remote-video');

        // --- BİLDİRİM SİSTEMLERİ ---
        let originalTitle = document.title;
        let blinkInterval;
        let isWindowFocused = true;

        window.addEventListener('focus', () => {
            isWindowFocused = true;
            clearInterval(blinkInterval);
            document.title = originalTitle;
        });
        window.addEventListener('blur', () => { isWindowFocused = false; });

        function notifyTab() {
            if (!isWindowFocused) {
                clearInterval(blinkInterval);
                let showNew = true;
                blinkInterval = setInterval(() => {
                    document.title = showNew ? "💬 Yeni Bildirim!" : originalTitle;
                    showNew = !showNew;
                }, 1000);
            }
        }

        function playNotification(isPing = false) {
            if ("vibrate" in navigator) {
                if (isPing) navigator.vibrate([300, 100, 300, 100, 300]); 
                else navigator.vibrate([150, 50, 150]); 
            }
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.type = isPing ? 'sawtooth' : 'sine'; 
                if (isPing) {
                    osc.frequency.setValueAtTime(800, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.3);
                } else {
                    osc.frequency.setValueAtTime(440, ctx.currentTime); 
                    osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1); 
                }
                gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.4);
            } catch (e) { console.warn("Ses çalınamadı.", e); }
            notifyTab();
        }

        // --- 1. OTURUM BAŞLATMA ---
        window.onload = () => {
            const savedLocalUser = localStorage.getItem('hrmsg_user');
            const savedSessionUser = sessionStorage.getItem('hrmsg_user');
            if (savedLocalUser) initUser(savedLocalUser); 
            else if (savedSessionUser) initUser(savedSessionUser); 
            renderFriends(); 
        };

        document.getElementById('login-btn').addEventListener('click', () => {
            const rawName = usernameInput.value.trim();
            if (rawName.length < 3) { alert("En az 3 karakter!"); return; }
            const cleanName = rawName.toLowerCase().replace(/\s+/g, '');
            if (rememberMeCheck.checked) localStorage.setItem('hrmsg_user', cleanName);
            else sessionStorage.setItem('hrmsg_user', cleanName);
            initUser(cleanName);
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            if(confirm("Çıkış yapmak istediğinize emin misiniz?")) {
                localStorage.removeItem('hrmsg_user'); sessionStorage.removeItem('hrmsg_user');
                if(currentCall) endCall();
                if (currentConnection) currentConnection.close();
                if (peer) peer.destroy();
                location.reload(); 
            }
        });

        // --- 2. PEERJS BAŞLATMA VE ARAMA (CALL) DİNLEYİCİSİ ---
        function initUser(username) {
            myUsername = username;
            document.getElementById('my-username-display').innerText = "@" + myUsername;
            peer = new Peer(PREFIX + myUsername);

            peer.on('open', (id) => {
                loginScreen.style.opacity = '0';
                setTimeout(() => { loginScreen.style.display = 'none'; appScreen.style.display = 'flex'; }, 300);
                networkStatus.innerHTML = "Ağa Katıldın <span style='color:#10b981'>● Online</span>";
            });

            peer.on('connection', (conn) => {
                currentConnection = conn;
                setupConnectionEvents(conn);
            });

            // Gelen Aramayı (Ses veya Video) Dinle
            peer.on('call', (call) => {
                pendingCall = call;
                // Arama türünü metadatadan çek, yoksa varsayılan sesli say
                const isVideo = call.metadata && call.metadata.type === 'video';
                callerNameDisplay.innerText = call.peer.replace(PREFIX, '@') + (isVideo ? " görüntülü arıyor..." : " sesli arıyor...");
                callModal.style.display = 'block';
                playNotification(true); 
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    alert("Hesap başka sekmede açık!"); localStorage.removeItem('hrmsg_user'); location.reload();
                }
            });
        }

        // --- 3. ARKADAŞ LİSTESİ YÖNETİMİ ---
        document.getElementById('add-friend-btn').addEventListener('click', () => {
            const friendName = document.getElementById('new-friend-input').value.trim().toLowerCase().replace(/\s+/g, '');
            if (friendName === myUsername) { alert("Kendinizi ekleyemezsiniz!"); return; }
            if (friendName.length === 0) return;
            if (!friends.includes(friendName)) { friends.push(friendName); saveFriends(); renderFriends(); }
            document.getElementById('new-friend-input').value = '';
        });

        function saveFriends() { localStorage.setItem('hrmsg_friends', JSON.stringify(friends)); }
        function renderFriends() {
            friendsListEl.innerHTML = '';
            friends.forEach(friend => {
                const li = document.createElement('li');
                li.className = 'friend-item';
                li.innerHTML = `
                    <div class="friend-name" onclick="connectToUser('${friend}')">@${friend}</div>
                    <button class="btn-delete" onclick="deleteFriend('${friend}', event)">✖</button>
                `;
                friendsListEl.appendChild(li);
            });
        }
        function deleteFriend(friendName, event) {
            event.stopPropagation();
            if(confirm(`@${friendName} silinecek?`)) { friends = friends.filter(f => f !== friendName); saveFriends(); renderFriends(); }
        }

        // --- 4. VERİ BAĞLANTISI (CHAT) ---
        window.connectToUser = function(targetRaw) {
            networkStatus.innerHTML = `Aranıyor: @${targetRaw}...`;
            const conn = peer.connect(PREFIX + targetRaw);
            currentConnection = conn;
            setupConnectionEvents(conn);
        };

        function setupConnectionEvents(conn) {
            conn.on('open', () => {
                const targetName = conn.peer.replace(PREFIX, '');
                chatTitle.innerText = "@" + targetName;
                document.getElementById('connection-status').style.display = 'block';
                networkStatus.innerHTML = `Bağlı <span style='color:#3b82f6'>⇄ @${targetName}</span>`;
                
                messageInput.disabled = false; document.getElementById('send-btn').disabled = false;
                document.getElementById('ping-btn').disabled = false; micBtn.disabled = false;
                
                // Arama butonlarını göster
                btnStartCall.style.display = 'inline-block'; 
                btnStartVideo.style.display = 'inline-block'; 
                
                chatBox.innerHTML = '';
                appendSystemMessage("Bağlantı kuruldu. Metin, sesli mesaj, sesli veya görüntülü arama yapabilirsiniz.");
                if(window.innerWidth <= 768) { sidebar.classList.add('hidden'); }
            });

            conn.on('data', (data) => {
                if (data.type === 'message') {
                    appendMessage(data.text, 'received', '');
                    conn.send({ type: 'read-receipt', id: data.msgId });
                    playNotification(false);
                } 
                else if (data.type === 'voice') {
                    const audioBlob = new Blob([data.audio], { type: 'audio/webm' });
                    appendVoiceMessage(audioBlob, 'received', '');
                    conn.send({ type: 'read-receipt', id: data.msgId });
                    playNotification(false);
                }
                else if (data.type === 'ping') { triggerPing(); playNotification(true); }
                else if (data.type === 'read-receipt') {
                    const statusSpan = document.getElementById('status-' + data.id);
                    if (statusSpan) { statusSpan.innerText = 'R'; statusSpan.className = 'status-r'; }
                }
                else if (data.type === 'call-rejected') {
                    appendSystemMessage("Karşı taraf aramayı reddetti."); endCall();
                }
                else if (data.type === 'call-ended') {
                    appendSystemMessage("Karşı taraf aramayı sonlandırdı."); endCall();
                }
            });

            conn.on('close', () => {
                appendSystemMessage("Bağlantı koptu.");
                disableChat();
                if(currentCall) endCall();
            });
        }

        // --- 5. MESAJLAŞMA ---
        document.getElementById('chat-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (text === '' || !currentConnection || !currentConnection.open) return;
            const msgId = Date.now().toString();
            currentConnection.send({ type: 'message', text: text, msgId: msgId });
            appendMessage(text, 'sent', msgId); messageInput.value = '';
        });

        document.getElementById('ping-btn').addEventListener('click', () => {
            if (currentConnection && currentConnection.open) { currentConnection.send({ type: 'ping' }); triggerPing(true); }
        });

        micBtn.addEventListener('click', async () => {
            if (!currentConnection || !currentConnection.open) return;
            if (currentCall) { alert("Arama esnasında sesli mesaj gönderilemez."); return; }

            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' }); audioChunks = [];
                        const msgId = Date.now().toString();
                        currentConnection.send({ type: 'voice', audio: audioBlob, msgId: msgId });
                        appendVoiceMessage(audioBlob, 'sent', msgId);
                        stream.getTracks().forEach(track => track.stop());
                    };
                    mediaRecorder.start(); isRecording = true;
                    micBtn.classList.add('recording'); messageInput.disabled = true;
                    messageInput.placeholder = "🔴 Ses kaydediliyor... (Bitirmek için tıklayın)";
                } catch (err) { alert("Mikrofon erişimi reddedildi."); }
            } else {
                mediaRecorder.stop(); isRecording = false;
                micBtn.classList.remove('recording'); messageInput.disabled = false;
                messageInput.placeholder = "Mesaj yazın...";
            }
        });

        // --- 6. CANLI SESLİ & GÖRÜNTÜLÜ ARAMA SİSTEMİ ---

        // Sesli Arama Başlat
        btnStartCall.addEventListener('click', () => startCallProcess(false));
        
        // Görüntülü Arama Başlat
        btnStartVideo.addEventListener('click', () => startCallProcess(true));

        async function startCallProcess(isVideo) {
            if (!currentConnection || !currentConnection.open) return;
            try {
                // Kamera/Mikrofon izni iste
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: isVideo });
                
                // Kendi görüntümüzü ekrana yansıt
                if(isVideo) {
                    localVideo.srcObject = localStream;
                    videoOverlay.style.display = 'flex';
                }

                // Aramayı Başlat (Metadata ile türünü belirt)
                currentCall = peer.call(currentConnection.peer, localStream, { metadata: { type: isVideo ? 'video' : 'audio' } });
                
                setupCallEvents(currentCall, isVideo);
                uiCallActive();
                appendSystemMessage(isVideo ? "📹 Görüntülü aranıyor..." : "📞 Sesli aranıyor...");
            } catch (err) { 
                console.error(err);
                alert("Kamera veya Mikrofona erişilemedi. İzin verdiğinizden emin olun."); 
            }
        }

        // Gelen Aramayı Yanıtla
        btnAcceptCall.addEventListener('click', async () => {
            callModal.style.display = 'none';
            if(!pendingCall) return;
            
            const isVideo = pendingCall.metadata && pendingCall.metadata.type === 'video';
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: isVideo });
                
                if(isVideo) {
                    localVideo.srcObject = localStream;
                    videoOverlay.style.display = 'flex';
                }

                pendingCall.answer(localStream);
                currentCall = pendingCall;
                setupCallEvents(currentCall, isVideo);
                uiCallActive();
                appendSystemMessage(isVideo ? "📹 Görüntülü arama yanıtlandı." : "📞 Sesli arama yanıtlandı.");
            } catch (err) { 
                alert("Kamera/Mikrofona erişilemedi!"); 
                btnRejectCall.click(); 
            }
        });

        // Gelen Aramayı Reddet
        btnRejectCall.addEventListener('click', () => {
            callModal.style.display = 'none';
            if (pendingCall) { pendingCall.close(); pendingCall = null; }
            if (currentConnection && currentConnection.open) currentConnection.send({ type: 'call-rejected' });
        });

        // Kapat Butonu
        btnEndCall.addEventListener('click', () => {
            if (currentConnection && currentConnection.open) currentConnection.send({ type: 'call-ended' });
            appendSystemMessage("🛑 Aramayı sonlandırdınız.");
            endCall();
        });

        // Arama Olaylarını Dinle
        function setupCallEvents(call, isVideo) {
            call.on('stream', (remoteStream) => {
                if(isVideo) {
                    remoteVideo.srcObject = remoteStream;
                } else {
                    remoteLiveAudio.srcObject = remoteStream;
                }
            });
            call.on('close', endCall);
            call.on('error', endCall);
        }

        // Aramayı Temizle
        function endCall() {
            if (currentCall) { currentCall.close(); currentCall = null; }
            if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
            
            remoteLiveAudio.srcObject = null;
            remoteVideo.srcObject = null;
            localVideo.srcObject = null;
            videoOverlay.style.display = 'none'; // Videoyu gizle
            
            pendingCall = null;
            uiCallInactive();
        }

        // UI Güncellemeleri
        function uiCallActive() {
            btnStartCall.style.display = 'none';
            btnStartVideo.style.display = 'none';
            btnEndCall.style.display = 'inline-block';
        }
        function uiCallInactive() {
            if(currentConnection && currentConnection.open) {
                btnStartCall.style.display = 'inline-block';
                btnStartVideo.style.display = 'inline-block';
            } else {
                btnStartCall.style.display = 'none';
                btnStartVideo.style.display = 'none';
            }
            btnEndCall.style.display = 'none';
            callModal.style.display = 'none';
        }

        // --- 7. YARDIMCI EKRAN FONKSİYONLARI ---
        function appendMessage(text, type, msgId) {
            const msgDiv = document.createElement('div'); msgDiv.className = `message ${type}`;
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            let statusHtml = type === 'sent' ? `<span id="status-${msgId}" class="status-d">D</span>` : '';
            msgDiv.innerHTML = `<div>${text}</div><span class="msg-time">${time} ${statusHtml}</span>`;
            chatBox.appendChild(msgDiv); chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendVoiceMessage(blob, type, msgId) {
            const msgDiv = document.createElement('div'); msgDiv.className = `message ${type}`;
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            let statusHtml = type === 'sent' ? `<span id="status-${msgId}" class="status-d">D</span>` : '';
            const audioUrl = URL.createObjectURL(blob);
            msgDiv.innerHTML = `<div><audio controls src="${audioUrl}"></audio></div><span class="msg-time">${time} ${statusHtml}</span>`;
            chatBox.appendChild(msgDiv); chatBox.scrollTop = chatBox.scrollHeight;
        }

        function triggerPing(isSender = false) {
            const msgDiv = document.createElement('div'); msgDiv.className = 'message ping';
            msgDiv.innerText = isSender ? 'PING GÖNDERİLDİ!' : '!!! PING !!!';
            chatBox.appendChild(msgDiv); chatBox.scrollTop = chatBox.scrollHeight;
            document.body.classList.add('shake-animation');
            setTimeout(() => document.body.classList.remove('shake-animation'), 400);
        }

        function appendSystemMessage(text) {
            const sysDiv = document.createElement('div');
            sysDiv.style.textAlign = 'center'; sysDiv.style.color = '#9ca3af'; sysDiv.style.fontSize = '12px'; sysDiv.style.padding = '10px 0';
            sysDiv.innerText = text; chatBox.appendChild(sysDiv); chatBox.scrollTop = chatBox.scrollHeight;
        }

        function disableChat() {
            chatTitle.innerText = "Bir Kişi Seçin";
            document.getElementById('connection-status').style.display = 'none';
            messageInput.disabled = true; document.getElementById('send-btn').disabled = true;
            document.getElementById('ping-btn').disabled = true; micBtn.disabled = true;
            btnStartCall.style.display = 'none'; btnStartVideo.style.display = 'none'; btnEndCall.style.display = 'none';
            networkStatus.innerHTML = "Ağa Katıldın <span style='color:#10b981'>● Online</span>";
        }

        document.getElementById('back-btn').addEventListener('click', () => { sidebar.classList.remove('hidden'); });
    </script>
</body>
</html>
